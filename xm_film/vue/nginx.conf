server {
    listen 80;
    server_name rjfwealth.cn www.rjfwealth.cn;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name rjfwealth.cn www.rjfwealth.cn;

    ssl_certificate     /etc/letsencrypt/live/rjfwealth.cn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rjfwealth.cn/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://backend:9090/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /files/ {
        proxy_pass http://backend:9090/files/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control "no-cache, must-revalidate";
    }
}
