server:
  port: 9090  # 应用服务端口号，访问地址为 http://localhost:9090

spring:
  datasource:
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DB_HOST:localhost}:3306/xm-film?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true

  sql:
    init:
      mode: never
      schema-locations: classpath:db/schema.sql
      data-locations: classpath:db/data.sql
      continue-on-error: true

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

mybatis:
  configuration:
    log-impl: ${MYBATIS_LOG_IMPL:org.apache.ibatis.logging.slf4j.Slf4jImpl}
    map-underscore-to-camel-case: true
  mapper-locations: classpath:mapper/*.xml

logging:
  level:
    com.example.springboot.mapper: ${MYBATIS_LOG_LEVEL:DEBUG}




fileBaseUrl: http://localhost:${server.port}

jwt:
  secret: ${JWT_SECRET:xm-film-secret-key-2024-springboot-vue3-jwt-auth}
  expire: ${JWT_EXPIRE:86400000}

file:
  upload-dir: ${FILE_UPLOAD_DIR:D:/project/picture}
  access-prefix: ${fileBaseUrl}/files/



