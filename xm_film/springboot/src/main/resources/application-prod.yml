server:
  port: ${SERVER_PORT:9090}

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DB_HOST:mysql}:${DB_PORT:3306}/xm-film?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=utf-8&useSSL=false&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD}

jwt:
  secret: ${JWT_SECRET}
  expire: ${JWT_EXPIRE:86400000}

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS}

file:
  upload-dir: ${FILE_UPLOAD_DIR:/app/uploads}
  access-prefix: ${FILE_ACCESS_PREFIX:/files/}

logging:
  level:
    com.example.springboot.mapper: ${MYBATIS_LOG_LEVEL:WARN}
