# ============================================================
# 影院购票管理系统 — CI 自动化流水线
# 触发条件：push / pull_request 到 master 分支
# 流程：后端编译 → 前端构建 → 数据库初始化 → E2E 测试
# ============================================================
name: Cinema CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  # ========== Job 1: 后端编译与打包 ==========
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: xm_film/springboot

    steps:
      - uses: actions/checkout@v4

      - name: 设置 JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Maven 打包
        run: mvn clean package -DskipTests -q

      - name: 上传后端 artifact
        uses: actions/upload-artifact@v4
        with:
          name: springboot-jar
          path: xm_film/springboot/target/*.jar
          retention-days: 1

  # ========== Job 2: 前端构建 ==========
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: xm_film/vue

    steps:
      - uses: actions/checkout@v4

      - name: 设置 Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: xm_film/vue/package-lock.json

      - name: 安装依赖
        run: npm ci

      - name: 前端构建
        run: npm run build

      - name: 上传前端 artifact
        uses: actions/upload-artifact@v4
        with:
          name: vue-dist
          path: xm_film/vue/dist
          retention-days: 1

  # ========== Job 3: E2E 全量测试 ==========
  e2e-tests:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    defaults:
      run:
        working-directory: xm_film/vue

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: 123456
          MYSQL_DATABASE: xm-film
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - uses: actions/checkout@v4

      - name: 安装 MySQL 客户端
        run: sudo apt-get update && sudo apt-get install -y mysql-client

      - name: 初始化数据库
        run: cd ../sql && mysql -h 127.0.0.1 -u root -p123456 < init.sql

      - name: 创建上传目录
        run: mkdir -p /tmp/xm-film-uploads

      - name: 设置 Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: xm_film/vue/package-lock.json

      - name: 安装前端依赖
        run: npm ci

      - name: 安装 Playwright Chromium
        run: npx playwright install chromium

      - name: 下载后端 JAR
        uses: actions/download-artifact@v4
        with:
          name: springboot-jar

      - name: 启动后端（CI 配置）
        run: |
          java -jar springboot-0.0.1-SNAPSHOT.jar --spring.profiles.active=ci &
          echo "等待后端启动..."
          timeout 60 bash -c 'until curl -s http://localhost:9090/api/v1/auth/years > /dev/null 2>&1; do sleep 1; done'
          echo "后端就绪"

      - name: 运行 E2E 测试
        run: node e2e-tests/e2e-scan.spec.mjs

      - name: 上传 Playwright 报告
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: xm_film/vue/e2e-tests/playwright-report/
          retention-days: 7

      - name: 上传测试截图
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-screenshots
          path: xm_film/vue/e2e-tests/screenshots/
          retention-days: 7

  # ========== Job 4: 综合报告 ==========
  summary:
    runs-on: ubuntu-latest
    needs: [backend, frontend, e2e-tests]
    if: always()

    steps:
      - uses: actions/checkout@v4

      - name: 生成 CI 汇总
        run: |
          echo "# CI 运行汇总" > $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 项目信息" >> $GITHUB_STEP_SUMMARY
          echo "- **项目名称**: 影院购票管理系统" >> $GITHUB_STEP_SUMMARY
          echo "- **技术栈**: Spring Boot 3.3.13 + Vue 3.5.13 + MySQL 8.0" >> $GITHUB_STEP_SUMMARY
          echo "- **分支**: \${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **提交**: \${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Jobs 状态" >> $GITHUB_STEP_SUMMARY
          echo "- **后端编译**: \${{ needs.backend.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **前端构建**: \${{ needs.frontend.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **E2E 测试**: \${{ needs.e2e-tests.result }}" >> $GITHUB_STEP_SUMMARY
