# ============================================================
# 影院购票管理系统 — Docker Compose
# 启动: docker compose up -d
# 停止: docker compose down
# ============================================================

services:
  # ---- MySQL 8.0 ----
  mysql:
    image: mysql:8.0
    container_name: project-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: xm-film
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./xm_film/sql/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./xm_film/sql/data.sql:/docker-entrypoint-initdb.d/02-data.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ---- Spring Boot 后端 ----
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: project-backend
    ports:
      - "${BACKEND_PORT:-9090}:9090"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SERVER_PORT: 9090
      DB_HOST: mysql
      DB_PORT: ${DB_PORT:-3306}
      DB_USERNAME: ${DB_USERNAME:-root}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRE: ${JWT_EXPIRE:-86400000}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173}
      FILE_UPLOAD_DIR: ${FILE_UPLOAD_DIR:-/app/uploads}
      FILE_ACCESS_PREFIX: ${FILE_ACCESS_PREFIX:-/files/}
      MYBATIS_LOG_LEVEL: ${MYBATIS_LOG_LEVEL:-WARN}
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9090/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 5
    volumes:
      - uploads:${FILE_UPLOAD_DIR:-/app/uploads}
    restart: unless-stopped

  # ---- Vue 前端 (Nginx) ----
  frontend:
    build:
      context: ./xm_film/vue
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/}
    container_name: project-frontend
    ports:
      - "${FRONTEND_PORT:-80}:80"
      - "443:443"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-s", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro

volumes:
  mysql-data:
  uploads:
